name: Flutter Release Build

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Set up Ruby for Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install Android Fastlane
        run: |
          cd android
          bundle init || true
          bundle add fastlane || true
          bundle install

      - name: Install iOS Fastlane
        run: |
          cd ios
          bundle init || true
          bundle add fastlane || true
          bundle install

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Android release APK
        run: |
          cd android
          bundle exec fastlane build_release_apk

      - name: Build iOS release IPA without codesign
        if: ${{ hashFiles('ios/Podfile') != '' }}
        run: |
          cd ios
          bundle exec fastlane build_release_ipa

      - name: Read version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ steps.version.outputs.version }}
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload iOS IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ steps.version.outputs.version }}
          path: build/ios/ipa/*.ipa

      - name: Create and push tag if missing
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi